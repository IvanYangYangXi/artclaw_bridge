  <line x1="14" y1="8" x2="14" y2="14" stroke="#6AB4FF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Claw marks (3 strokes) -->
  <line x1="8" y1="2" x2="8" y2="7" stroke="#FFA530" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="1.5" x2="10" y2="6.5" stroke="#FFA530" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="2" x2="12" y2="7" stroke="#FFA530" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Connection dot -->
